worker_processes  1;

events {
    worker_connections  1024;
}

http {
    log_format dockistrate '$realip_remote_addr $remote_addr $host "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log dockistrate;
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}

stream {
    include /etc/nginx/stream_conf/*.conf;
}
