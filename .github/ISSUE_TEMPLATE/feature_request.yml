name: Feature request
description: Suggest a Dockistrate capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What operator workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired command, prompt, config, or generated output.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Expected user-facing surface
      options:
        - CLI and interactive
        - CLI only
        - Interactive only
        - Documentation only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation ideas
      description: What tests or manual checks would prove this works?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds, direct Docker/Nginx commands, or other tools.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples or constraints. Do not include secrets or private keys.
