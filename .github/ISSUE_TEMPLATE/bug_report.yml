name: Bug report
description: Report a reproducible Dockistrate problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Dockistrate issue. Please remove secrets, private
        keys, real certificates, and sensitive domains before submitting logs or
        generated configuration.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact Dockistrate commands or interactive flow.
      placeholder: |
        1. ./dockistrate.sh ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized output, errors, or generated config snippets.
    validations:
      required: true
  - type: input
    id: dockistrate-version
    attributes:
      label: Dockistrate version or commit
      placeholder: "./dockistrate.sh --version or git rev-parse --short HEAD"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - CLI
        - Interactive
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Debian 12, ..."
    validations:
      required: true
  - type: input
    id: shell
    attributes:
      label: Shell and Bash version
      placeholder: "/bin/bash --version"
  - type: input
    id: docker
    attributes:
      label: Docker version/status
      placeholder: "docker version; Docker Desktop or Docker Engine"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add sanitized logs, status output, or screenshots if useful.
